<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>${title}</title>
  <style>
    :root { color-scheme: dark; background: #0b0c0f; }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { color: white; background: #0b0c0f; font-family: system-ui, sans-serif; }
    .stage { position: fixed; inset: 0; display: grid; place-items: center; }
    .stage > :not(.kino-measure-sandbox) { grid-area: 1 / 1; }
    .kino-stage-stack {
      position: relative;
      max-width: 100vw;
      max-height: 100vh;
    }
    .kino-stage-frame {
      display: block;
      width: 100%;
      height: 100%;
    }
    .kino-stage-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .kino-measure-sandbox {
      position: absolute;
      inset: 0;
      width: 0;
      height: 0;
      overflow: hidden;
      visibility: hidden;
      pointer-events: none;
    }
    .controls {
      position: fixed; right: 18px; bottom: 18px; display: flex; align-items: center;
      gap: 7px; opacity: .12; transition: opacity .2s; z-index: 3;
    }
    .controls:hover, .controls:focus-within { opacity: 1; }
    button { color: inherit; font: inherit; cursor: pointer; }
    .control {
      width: 42px; height: 42px; border: 1px solid rgb(255 255 255 / .2);
      border-radius: 50%; background: rgb(0 0 0 / .65); font-size: 18px;
    }
    .counter { min-width: 62px; text-align: center; font-size: 12px; text-shadow: 0 1px 2px black; }
    .timeline {
      position: fixed; left: 50%; bottom: 72px; z-index: 3; width: min(680px, calc(100vw - 36px));
      padding: 4px 7px; transform: translateX(-50%); border: 1px solid rgb(255 255 255 / .18);
      border-radius: 8px; background: rgb(10 11 14 / .82); backdrop-filter: blur(8px);
    }
    .timeline-track { position: relative; height: 14px; overflow: hidden; border-radius: 3px; background: rgb(255 255 255 / .08); cursor: ew-resize; touch-action: none; }
    .timeline-block { position: absolute; inset-block: 2px; min-width: 2px; border: 1px solid #477ba9; border-radius: 2px; background: #284967; pointer-events: none; }
    .timeline-playhead { position: absolute; inset-block: 0; width: 2px; background: #ff6573; pointer-events: none; }
    .progress { position: fixed; inset: auto 0 0; height: 3px; background: rgb(255 255 255 / .12); z-index: 4; }
    .progress span { display: block; width: 0; height: 100%; background: #65a7ff; transition: width .15s; }
    .overview {
      position: fixed; inset: 0; z-index: 5; overflow: auto; padding: 54px;
      background: rgb(12 14 18 / .96); backdrop-filter: blur(12px);
    }
    .overview header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .overview h1 { margin: 0; font-size: 24px; }
    .overview-close { padding: 9px 14px; border: 1px solid #444b57; border-radius: 7px; background: #242832; }
    .overview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 22px; }
    .overview-item { padding: 0; overflow: hidden; border: 2px solid transparent; border-radius: 8px; background: #1a1d23; text-align: left; }
    .overview-item:hover, .overview-item.active { border-color: #65a7ff; }
    .overview-item img { display: block; width: 100%; aspect-ratio: 4 / 3; object-fit: contain; background: #090a0c; }
    .overview-item span { display: block; padding: 10px 12px; }
    .help { position: fixed; left: 14px; bottom: 10px; z-index: 2; color: rgb(255 255 255 / .25); font-size: 11px; }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <main class="stage"><span>Loading presentation…</span></main>
  <div class="help">← animation start · → continue / double-tap to step · Space play/pause · O overview · F fullscreen</div>
  <nav class="controls" aria-label="Presentation controls">
    <button class="control" data-action="previous" aria-label="Previous animation">&#8592;</button>
    <button class="control" data-action="play" aria-label="Play animation">&#9654;</button>
    <span class="counter"></span>
    <button class="control" data-action="next" aria-label="Continue">&#8594;</button>
    <button class="control" data-action="overview" aria-label="Slide overview">&#9783;</button>
  </nav>
  <div class="timeline" aria-label="Animation timeline" hidden>
    <div class="timeline-track"><div class="timeline-blocks"></div><span class="timeline-playhead"></span></div>
  </div>
  <div class="progress"><span></span></div>
  <section class="overview" aria-label="Slide overview" hidden>
    <header><h1>Slides</h1><button class="overview-close">Close</button></header>
    <div class="overview-grid"></div>
  </section>
  <script>
    ${morph_runtime_source}
    (() => {
      const getManifest = () => ${manifest_source};
      const stage = document.querySelector(".stage");
      const counter = document.querySelector(".counter");
      const progress = document.querySelector(".progress span");
      const playButton = document.querySelector('[data-action="play"]');
      const overview = document.querySelector(".overview");
      const overviewGrid = document.querySelector(".overview-grid");
      const timeline = document.querySelector(".timeline");
      const timelineTrack = document.querySelector(".timeline-track");
      const timelineBlocks = document.querySelector(".timeline-blocks");
      const timelinePlayhead = document.querySelector(".timeline-playhead");
      const stageRenderer = KinoMorphRuntime.createStageRenderer(stage);
      let manifest;
      let sceneIndex = 0;
      let frameIndex = 0;
      let playing = false;
      let animationHandle = 0;
      let nextFrameAt = 0;
      let lastForwardAt = -Infinity;
      let rapidForward = false;
      let rapidForwardReset = 0;
      const rapidForwardThreshold = 400;
      const rapidForwardTimeout = 2000;
      let scrubbing = false;
      let timelineRevealed = false;

      function scene() { return manifest.scenes[sceneIndex]; }
      function clamp(value, minimum, maximum) { return Math.max(minimum, Math.min(value, maximum)); }
      function framePercentage(frame, current = scene()) {
        return current.frameCount > 1 ? frame / (current.frameCount - 1) * 100 : 0;
      }
      function fitStage(stack = stage.querySelector(".kino-stage-stack")) {
        if (!stack) return;
        const width = Number(stack.dataset.kinoWidth);
        const height = Number(stack.dataset.kinoHeight);
        const scale = Math.min(window.innerWidth / width, window.innerHeight / height);
        stack.style.width = width * scale + "px";
        stack.style.height = height * scale + "px";
      }
      function renderTimeline() {
        const current = scene();
        timelineBlocks.replaceChildren(...current.blocks.map(block => {
          const item = document.createElement("span");
          item.className = "timeline-block";
          item.style.left = framePercentage(block.start_frame, current) + "%";
          item.style.width = Math.max(0, framePercentage(block.end_frame, current) - framePercentage(block.start_frame, current)) + "%";
          return item;
        }));
        updateTimeline();
      }
      function updateTimeline() {
        if (!manifest) return;
        const current = scene();
        timeline.hidden = playing || !timelineRevealed || current.frameCount <= 1;
        timelinePlayhead.style.left = framePercentage(frameIndex, current) + "%";
      }
      async function render() {
        const current = scene();
        frameIndex = clamp(frameIndex, 0, current.frameCount - 1);
        await stageRenderer.render(current, frameIndex);
        fitStage();
        counter.textContent = (sceneIndex + 1) + " / " + manifest.scenes.length;
        progress.style.width = ((sceneIndex + 1) / manifest.scenes.length * 100) + "%";
        updateTimeline();
        history.replaceState(null, "", "#" + (sceneIndex + 1));
        stageRenderer.prefetch(current, frameIndex + 1);
      }
      function pause(revealTimeline = false) {
        playing = false;
        timelineRevealed = revealTimeline;
        cancelAnimationFrame(animationHandle);
        playButton.textContent = "▶";
        updateTimeline();
      }
      function selectScene(index, initialFrame = 0) {
        pause();
        sceneIndex = clamp(index, 0, manifest.scenes.length - 1);
        frameIndex = clamp(initialFrame, 0, scene().frameCount - 1);
        overview.hidden = true;
        renderTimeline();
        render().catch(console.error);
      }
      function startPlayback() {
        if (playing) return;
        if (frameIndex >= scene().frameCount - 1) frameIndex = 0;
        playing = true;
        timelineRevealed = false;
        playButton.textContent = "❚❚";
        updateTimeline();
        nextFrameAt = performance.now();
        animationHandle = requestAnimationFrame(tick);
      }
      function togglePlayback() {
        if (playing) pause(true);
        else startPlayback();
      }
      function tick(now) {
        if (!playing) return;
        if (now >= nextFrameAt) {
          if (frameIndex >= scene().frameCount - 1) { pause(); return; }
          frameIndex += 1;
          render().catch(console.error);
          if (scene().cuts.some(cut => cut.frame === frameIndex)) { pause(); return; }
          nextFrameAt += 1000 / scene().fps;
        }
        animationHandle = requestAnimationFrame(tick);
      }
      function resetRapidForward() {
        clearTimeout(rapidForwardReset);
        lastForwardAt = -Infinity;
        rapidForward = false;
      }
      function scheduleRapidForwardReset() {
        clearTimeout(rapidForwardReset);
        rapidForwardReset = setTimeout(resetRapidForward, rapidForwardTimeout);
      }
      function stepToNextKeyframe() {
        pause();
        const next = KinoMorphRuntime.sceneKeyframes(scene()).find(keyframe => keyframe > frameIndex);
        if (next !== undefined) {
          frameIndex = next;
          render().catch(console.error);
        } else if (sceneIndex < manifest.scenes.length - 1) {
          selectScene(sceneIndex + 1);
        }
      }
      function continueForward() {
        const now = performance.now();
        const isRapid = rapidForward || now - lastForwardAt <= rapidForwardThreshold;
        lastForwardAt = now;
        scheduleRapidForwardReset();
        if (isRapid) {
          rapidForward = true;
          stepToNextKeyframe();
        } else if (playing) {
          return;
        } else if (frameIndex < scene().frameCount - 1) {
          startPlayback();
        } else if (sceneIndex < manifest.scenes.length - 1) {
          selectScene(sceneIndex + 1);
        }
      }
      function goBackToKeyframe() {
        pause();
        resetRapidForward();
        const keyframes = KinoMorphRuntime.sceneKeyframes(scene());
        const currentStart = keyframes.filter(keyframe => keyframe <= frameIndex).at(-1) ?? 0;
        const target = frameIndex > currentStart
          ? currentStart
          : keyframes.filter(keyframe => keyframe < currentStart).at(-1);
        if (target !== undefined) {
          frameIndex = target;
          render().catch(console.error);
        } else if (sceneIndex > 0) {
          const previousScene = manifest.scenes[sceneIndex - 1];
          const previousStart = KinoMorphRuntime.sceneKeyframes(previousScene).at(-1) ?? 0;
          selectScene(sceneIndex - 1, previousStart);
        }
      }
      function seekTimeline(clientX) {
        const bounds = timelineTrack.getBoundingClientRect();
        const position = clamp((clientX - bounds.left) / bounds.width, 0, 1);
        pause(true);
        frameIndex = Math.round(position * Math.max(0, scene().frameCount - 1));
        render().catch(console.error);
      }
      function toggleOverview() { overview.hidden = !overview.hidden; }
      function renderOverview() {
        overviewGrid.replaceChildren(...manifest.scenes.map((item, index) => {
          const button = document.createElement("button");
          button.className = "overview-item" + (index === sceneIndex ? " active" : "");
          const image = document.createElement("img");
          image.src = item.frames[0];
          image.alt = "";
          const label = document.createElement("span");
          label.textContent = (index + 1) + ". " + item.name;
          button.append(image, label);
          button.addEventListener("click", () => selectScene(index));
          return button;
        }));
      }

      document.querySelector('[data-action="previous"]').addEventListener("click", goBackToKeyframe);
      document.querySelector('[data-action="next"]').addEventListener("click", continueForward);
      document.querySelector('[data-action="overview"]').addEventListener("click", toggleOverview);
      document.querySelector(".overview-close").addEventListener("click", toggleOverview);
      playButton.addEventListener("click", togglePlayback);
      timelineTrack.addEventListener("pointerdown", event => {
        scrubbing = true;
        timelineTrack.setPointerCapture(event.pointerId);
        seekTimeline(event.clientX);
      });
      timelineTrack.addEventListener("pointermove", event => {
        if (scrubbing) seekTimeline(event.clientX);
      });
      timelineTrack.addEventListener("pointerup", event => {
        scrubbing = false;
        timelineTrack.releasePointerCapture(event.pointerId);
      });
      timelineTrack.addEventListener("pointercancel", () => { scrubbing = false; });
      document.addEventListener("keydown", event => {
        if (event.repeat) return;
        if (event.key === " ") { event.preventDefault(); togglePlayback(); }
        else if (["ArrowRight", "PageDown"].includes(event.key)) { event.preventDefault(); continueForward(); }
        else if (["ArrowLeft", "PageUp"].includes(event.key)) { event.preventDefault(); goBackToKeyframe(); }
        else if (event.key.toLowerCase() === "o") toggleOverview();
        else if (event.key === "Escape" && !overview.hidden) overview.hidden = true;
        else if (event.key.toLowerCase() === "f") document.documentElement.requestFullscreen?.();
        else if (event.key === "Home") selectScene(0);
        else if (event.key === "End") selectScene(manifest.scenes.length - 1);
      });
      window.addEventListener("resize", () => fitStage());

      let resolveDebugReady;
      const debugReady = new Promise(resolve => { resolveDebugReady = resolve; });
      globalThis.KinoDebug = {
        ready: debugReady,
        async renderFrame(sceneReference, requestedFrame) {
          await debugReady;
          const requestedScene = typeof sceneReference === "number"
            ? manifest.scenes[sceneReference]
            : manifest.scenes.find(item => item.id === sceneReference);
          if (!requestedScene) throw new Error("Unknown scene: " + sceneReference);
          const exactFrame = clamp(Number(requestedFrame) || 0, 0, requestedScene.frameCount - 1);
          pause();
          await stageRenderer.render(requestedScene, exactFrame);
          const layers = [...stage.querySelectorAll(".kino-stage-frame")];
          return {
            scene: requestedScene.id,
            frame: exactFrame,
            layers: layers.map(layer => ({
              classes: [...layer.classList],
              paths: layer.querySelectorAll("path").length,
              generated: [...layer.querySelectorAll("[data-kino-generated-draw], [data-kino-generated-morph]")]
                .map(item => item.getAttribute("data-kino-generated-draw") || item.getAttribute("data-kino-generated-morph")),
            })),
          };
        },
        serializeFrame() {
          const stack = stage.querySelector(".kino-stage-stack");
          if (!stack) throw new Error("No rendered frame");
          const width = stack.dataset.kinoWidth;
          const height = stack.dataset.kinoHeight;
          const output = document.createElementNS("http://www.w3.org/2000/svg", "svg");
          output.setAttribute("xmlns", "http://www.w3.org/2000/svg");
          output.setAttribute("xmlns:xlink", "http://www.w3.org/1999/xlink");
          output.setAttribute("viewBox", "0 0 " + width + " " + height);
          output.setAttribute("width", width);
          output.setAttribute("height", height);
          for (const layer of stack.querySelectorAll(":scope > .kino-stage-frame")) {
            const clone = layer.cloneNode(true);
            clone.setAttribute("x", "0");
            clone.setAttribute("y", "0");
            clone.setAttribute("width", "100%");
            clone.setAttribute("height", "100%");
            output.appendChild(clone);
          }
          return new XMLSerializer().serializeToString(output);
        },
      };

      getManifest().then(value => {
        manifest = value;
        const requested = Number(location.hash.slice(1));
        sceneIndex = requested > 0 ? clamp(requested - 1, 0, manifest.scenes.length - 1) : 0;
        renderOverview();
        resolveDebugReady();
        if (new URLSearchParams(location.search).get("kino-debug") !== "1") {
          render().catch(console.error);
        }
      });
    })();
  </script>
</body>
</html>
