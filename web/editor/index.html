<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>${title} — Glissade</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: #181a1f;
      --panel-2: #22252c;
      --line: #353943;
      --muted: #949ba8;
      --accent: #65a7ff;
      --cut: #ffbd5c;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { color: #f3f5f7; background: #101114; font: 14px/1.4 system-ui, sans-serif; }
    button { color: inherit; font: inherit; }
    .app { height: 100%; display: grid; grid-template: 48px minmax(0, 1fr) 160px / 210px minmax(0, 1fr); }
    .toolbar {
      grid-column: 1 / -1; display: flex; align-items: center; gap: 8px;
      padding: 0 12px; background: var(--panel); border-bottom: 1px solid var(--line);
    }
    .brand { font-weight: 700; letter-spacing: .03em; margin-right: 10px; }
    .status { margin-left: auto; color: var(--muted); font-size: 12px; }
    .status.error { color: #ff7d86; }
    .tool-button {
      min-width: 34px; height: 32px; padding: 0 10px; border: 1px solid var(--line);
      border-radius: 6px; background: var(--panel-2); cursor: pointer;
    }
    .tool-button:hover { border-color: #59606d; }
    .toolbar-setting { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12px; white-space: nowrap; }
    .sidebar { overflow: auto; background: var(--panel); border-right: 1px solid var(--line); padding: 10px; }
    .sidebar h2 { margin: 2px 6px 10px; color: var(--muted); font-size: 11px; text-transform: uppercase; }
    .scene-button {
      display: block; width: 100%; padding: 9px 10px; margin-bottom: 5px; border: 1px solid transparent;
      border-radius: 6px; color: #c8cdd5; background: transparent; text-align: left; cursor: pointer;
    }
    .scene-button:hover { background: var(--panel-2); }
    .scene-button.active { color: white; border-color: #3d70ad; background: #243750; }
    .preview { position: relative; min-width: 0; min-height: 0; padding: 22px; overflow: hidden; }
    .stage { width: 100%; height: 100%; display: flex; overflow: auto; }
    .glissade-stage-stack {
      position: relative;
      flex: none;
      margin: auto;
      filter: drop-shadow(0 12px 28px rgb(0 0 0 / .35));
    }
    .glissade-stage-frame {
      display: block;
      width: 100%;
      height: 100%;
    }
    .glissade-stage-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .glissade-measure-sandbox {
      position: absolute;
      inset: 0;
      width: 0;
      height: 0;
      overflow: hidden;
      visibility: hidden;
      pointer-events: none;
    }
    .zoom-value { min-width: 48px; color: var(--muted); text-align: center; font-variant-numeric: tabular-nums; }
    .empty { color: var(--muted); }
    .timeline { grid-column: 1 / -1; background: var(--panel); border-top: 1px solid var(--line); padding: 10px 14px; }
    .timeline-head { height: 32px; display: flex; align-items: center; gap: 10px; }
    .timecode { white-space: nowrap; font-variant-numeric: tabular-nums; }
    .timeline-track { position: relative; height: 82px; margin-top: 6px; border: 1px solid var(--line); border-radius: 6px; background: #121318; overflow: hidden; cursor: ew-resize; user-select: none; }
    .ruler { position: absolute; inset: 0 0 auto; height: 24px; border-bottom: 1px solid var(--line); color: var(--muted); font-size: 10px; }
    .tick { position: absolute; top: 0; height: 100%; padding: 4px; border-left: 1px solid #30343c; }
    .blocks { position: absolute; inset: 31px 0 6px; }
    .block { position: absolute; top: 0; height: 45px; min-width: 2px; padding: 6px; overflow: hidden; white-space: nowrap; border: 1px solid #346391; border-radius: 4px; color: #cde5ff; background: #233e59; font-size: 11px; }
    .cut { position: absolute; inset: 0 auto 0; width: 2px; z-index: 3; background: var(--cut); pointer-events: none; }
    .cut::before { content: ""; position: absolute; top: 0; left: -4px; border: 5px solid transparent; border-top-color: var(--cut); }
    .playhead { position: absolute; inset: 0 auto 0; width: 1px; z-index: 4; background: #ff6573; pointer-events: none; }
    .playhead::before { content: ""; position: absolute; top: 0; left: -4px; border: 5px solid transparent; border-top-color: #ff6573; }
    .error-overlay { position: absolute; inset: 20px; z-index: 5; overflow: auto; padding: 18px; border: 1px solid #7c343b; border-radius: 8px; color: #ffd7da; background: rgb(46 18 22 / .94); white-space: pre-wrap; }
    [hidden] { display: none !important; }
    @media (max-width: 720px) {
      .app { grid-template-columns: 1fr; grid-template-rows: 48px minmax(0, 1fr) 160px; }
      .sidebar { display: none; }
      .preview { grid-column: 1; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="toolbar">
      <span class="brand">Glissade</span>
      <button class="tool-button" data-action="previous-scene" title="Previous slide">&#8592;</button>
      <button class="tool-button" data-action="play" title="Play or pause (Space)">&#9654;</button>
      <button class="tool-button" data-action="next-scene" title="Next slide">&#8594;</button>
      <button class="tool-button" data-action="previous-frame" title="Previous frame">&#8722;1</button>
      <button class="tool-button" data-action="next-frame" title="Next frame">+1</button>
      <button class="tool-button" data-action="zoom-out" title="Zoom out (Ctrl/⌘ −)">&#8722;</button>
      <span class="zoom-value">100%</span>
      <button class="tool-button" data-action="zoom-in" title="Zoom in (Ctrl/⌘ +)">+</button>
      <button class="tool-button" data-action="zoom-fit" title="Fit slide (Ctrl/⌘ 0)">Fit</button>
      <button class="tool-button" data-action="fullscreen" title="Fullscreen (F)">Fullscreen</button>
      <label class="toolbar-setting"><input type="checkbox" data-setting="pause-when-hidden"> Pause when hidden</label>
      <label class="toolbar-setting"><input type="checkbox" data-setting="pause-when-blurred"> Pause when unfocused</label>
      <span class="status">Loading…</span>
    </header>
    <aside class="sidebar"><h2>Scenes</h2><div class="scene-list"></div></aside>
    <section class="preview">
      <div class="stage"><span class="empty">Compiling preview…</span></div>
      <pre class="error-overlay" hidden></pre>
    </section>
    <section class="timeline">
      <div class="timeline-head">
        <strong class="scene-title">—</strong>
        <span class="timecode">00:00.000 / 00:00.000</span>
      </div>
      <div class="timeline-track" title="Click or drag to seek">
        <div class="ruler"></div>
        <div class="blocks"></div>
        <div class="cuts"></div>
        <div class="playhead"></div>
      </div>
    </section>
  </main>
  <script>
    ${morph_runtime_source}
    (() => {
      const getManifest = () => ${manifest_source};
      const liveReload = ${live_reload};
      const elements = {
        stage: document.querySelector(".stage"),
        sceneList: document.querySelector(".scene-list"),
        sceneTitle: document.querySelector(".scene-title"),
        status: document.querySelector(".status"),
        timecode: document.querySelector(".timecode"),
        ruler: document.querySelector(".ruler"),
        blocks: document.querySelector(".blocks"),
        cuts: document.querySelector(".cuts"),
        playhead: document.querySelector(".playhead"),
        timelineTrack: document.querySelector(".timeline-track"),
        play: document.querySelector('[data-action="play"]'),
        pauseWhenHidden: document.querySelector('[data-setting="pause-when-hidden"]'),
        pauseWhenBlurred: document.querySelector('[data-setting="pause-when-blurred"]'),
        zoomValue: document.querySelector(".zoom-value"),
        error: document.querySelector(".error-overlay")
      };
      const stageRenderer = GlissadeMorphRuntime.createStageRenderer(elements.stage);
      let manifest = null;
      let sceneIndex = 0;
      let frameIndex = 0;
      let playing = false;
      let animationHandle = 0;
      let playbackStartedAt = 0;
      let playbackStartFrame = 0;
      let pauseWhenHidden = true;
      let pauseWhenBlurred = false;
      let zoom = 1;
      let scrubbing = false;

      function scene() { return manifest?.scenes[sceneIndex]; }
      function clamp(value, minimum, maximum) { return Math.max(minimum, Math.min(value, maximum)); }
      function formatTime(seconds) {
        const minutes = Math.floor(seconds / 60).toString().padStart(2, "0");
        const remainder = Math.floor(seconds % 60).toString().padStart(2, "0");
        const millis = Math.floor((seconds % 1) * 1000).toString().padStart(3, "0");
        return minutes + ":" + remainder + "." + millis;
      }
      function percentage(value, total) { return total > 0 ? value / total * 100 : 0; }

      function updateZoom() {
        const stack = elements.stage.querySelector(".glissade-stage-stack");
        if (!stack) return;
        const width = Number(stack.dataset.glissadeWidth || 0);
        const height = Number(stack.dataset.glissadeHeight || 0);
        if (!width || !height) return;
        const bounds = elements.stage.getBoundingClientRect();
        const fit = Math.min(bounds.width / width, bounds.height / height);
        stack.style.width = Math.max(1, width * fit * zoom) + "px";
        stack.style.height = Math.max(1, height * fit * zoom) + "px";
        elements.zoomValue.textContent = Math.round(zoom * 100) + "%";
      }

      function setZoom(value) {
        zoom = clamp(value, .25, 4);
        updateZoom();
      }

      function renderSceneList() {
        elements.sceneList.replaceChildren(...manifest.scenes.map((item, index) => {
          const button = document.createElement("button");
          button.className = "scene-button" + (index === sceneIndex ? " active" : "");
          button.textContent = (index + 1) + ". " + item.name;
          button.addEventListener("click", () => selectScene(index));
          return button;
        }));
      }

      function renderTimeline() {
        const current = scene();
        const duration = current.duration || current.frameCount / current.fps;
        elements.ruler.replaceChildren();
        const tickCount = Math.max(2, Math.min(10, Math.ceil(duration) + 1));
        for (let index = 0; index < tickCount; index += 1) {
          const tick = document.createElement("span");
          tick.className = "tick";
          tick.style.left = percentage(index, tickCount - 1) + "%";
          tick.textContent = (duration * index / (tickCount - 1)).toFixed(1) + "s";
          elements.ruler.append(tick);
        }
        elements.blocks.replaceChildren(...current.blocks.map(block => {
          const element = document.createElement("div");
          element.className = "block";
          element.style.left = percentage(block.start, duration) + "%";
          element.style.width = percentage(block.duration, duration) + "%";
          element.textContent = "Block " + block.index;
          element.title = "Block " + block.index + ": " + block.duration.toFixed(3) + "s";
          return element;
        }));
        elements.cuts.replaceChildren(...current.cuts.map(cut => {
          const element = document.createElement("span");
          element.className = "cut";
          element.style.left = percentage(cut.frame, Math.max(1, current.frameCount - 1)) + "%";
          element.title = "Cut at frame " + cut.frame;
          return element;
        }));
      }

      async function renderFrame() {
        const current = scene();
        if (!current || !current.frames.length) return;
        frameIndex = clamp(frameIndex, 0, current.frameCount - 1);
        await stageRenderer.render(current, frameIndex);
        updateZoom();
        elements.playhead.style.left = percentage(frameIndex, Math.max(1, current.frameCount - 1)) + "%";
        const currentTime = frameIndex / current.fps;
        elements.timecode.textContent = formatTime(currentTime) + " / " + formatTime(current.duration);
        elements.status.textContent = "Slide " + (sceneIndex + 1) + " / " + manifest.scenes.length + " · Frame " + (frameIndex + 1) + " / " + current.frameCount;
        elements.status.classList.remove("error");
        for (const offset of [1, 2]) {
          stageRenderer.prefetch(current, frameIndex + offset);
        }
      }

      function selectScene(index, preserveFrame = false) {
        pause();
        sceneIndex = clamp(index, 0, manifest.scenes.length - 1);
        if (!preserveFrame) frameIndex = 0;
        elements.sceneTitle.textContent = scene().name;
        renderSceneList();
        renderTimeline();
        renderFrame().catch(showError);
        if (liveReload) fetch("/select?id=" + encodeURIComponent(scene().id));
        history.replaceState(null, "", "#scene=" + (sceneIndex + 1) + "&frame=" + frameIndex);
      }

      function seek(frame) {
        frameIndex = clamp(frame, 0, scene().frameCount - 1);
        renderFrame().catch(showError);
      }
      function seekTimeline(clientX) {
        const bounds = elements.timelineTrack.getBoundingClientRect();
        const position = clamp((clientX - bounds.left) / bounds.width, 0, 1);
        pause();
        seek(Math.round(position * Math.max(0, scene().frameCount - 1)));
      }
      function pause() {
        playing = false;
        cancelAnimationFrame(animationHandle);
        elements.play.textContent = "▶";
      }
      function play() {
        if (playing) { pause(); return; }
        if (frameIndex >= scene().frameCount - 1) frameIndex = 0;
        playing = true;
        elements.play.textContent = "❚❚";
        playbackStartedAt = performance.now();
        playbackStartFrame = frameIndex;
        animationHandle = requestAnimationFrame(tick);
      }
      function tick(now) {
        if (!playing) return;
        const elapsedFrames = Math.floor((now - playbackStartedAt) * scene().fps / 1000);
        const target = GlissadeMorphRuntime.advancePlaybackFrame(scene(), playbackStartFrame, elapsedFrames);
        if (target.frame !== frameIndex) {
          frameIndex = target.frame;
          renderFrame().catch(showError);
        }
        if (target.cut || target.ended) { pause(); return; }
        animationHandle = requestAnimationFrame(tick);
      }
      function showError(message) {
        elements.error.textContent = message;
        elements.error.hidden = false;
        elements.status.textContent = "Build failed";
        elements.status.classList.add("error");
      }
      function hideError() { elements.error.hidden = true; }

      async function loadManifest(preservePosition = false) {
        try {
          const oldScene = sceneIndex;
          const oldFrame = frameIndex;
          manifest = await getManifest();
          if (savedPauseWhenHidden === null || savedPauseWhenHidden === undefined) {
            pauseWhenHidden = manifest.pauseWhenHidden !== false;
            elements.pauseWhenHidden.checked = pauseWhenHidden;
          }
          if (savedPauseWhenBlurred === null || savedPauseWhenBlurred === undefined) {
            pauseWhenBlurred = manifest.pauseWhenBlurred === true;
            elements.pauseWhenBlurred.checked = pauseWhenBlurred;
          }
          hideError();
          sceneIndex = clamp(oldScene, 0, manifest.scenes.length - 1);
          frameIndex = preservePosition ? clamp(oldFrame, 0, manifest.scenes[sceneIndex].frameCount - 1) : 0;
          selectScene(sceneIndex, true);
        } catch (error) { showError(String(error)); }
      }

      document.querySelector('[data-action="previous-scene"]').addEventListener("click", () => selectScene(sceneIndex - 1));
      document.querySelector('[data-action="next-scene"]').addEventListener("click", () => selectScene(sceneIndex + 1));
      document.querySelector('[data-action="previous-frame"]').addEventListener("click", () => { pause(); seek(frameIndex - 1); });
      document.querySelector('[data-action="next-frame"]').addEventListener("click", () => { pause(); seek(frameIndex + 1); });
      document.querySelector('[data-action="zoom-out"]').addEventListener("click", () => setZoom(zoom / 1.2));
      document.querySelector('[data-action="zoom-in"]').addEventListener("click", () => setZoom(zoom * 1.2));
      document.querySelector('[data-action="zoom-fit"]').addEventListener("click", () => setZoom(1));
      document.querySelector('[data-action="fullscreen"]').addEventListener("click", () => document.documentElement.requestFullscreen?.());
      elements.pauseWhenHidden.addEventListener("change", () => {
        pauseWhenHidden = elements.pauseWhenHidden.checked;
        try { localStorage.setItem("glissade-pause-when-hidden", String(pauseWhenHidden)); } catch {}
      });
      elements.pauseWhenBlurred.addEventListener("change", () => {
        pauseWhenBlurred = elements.pauseWhenBlurred.checked;
        try { localStorage.setItem("glissade-pause-when-blurred", String(pauseWhenBlurred)); } catch {}
      });
      elements.play.addEventListener("click", play);
      elements.timelineTrack.addEventListener("pointerdown", event => {
        scrubbing = true;
        elements.timelineTrack.setPointerCapture(event.pointerId);
        seekTimeline(event.clientX);
      });
      elements.timelineTrack.addEventListener("pointermove", event => {
        if (scrubbing) seekTimeline(event.clientX);
      });
      elements.timelineTrack.addEventListener("pointerup", event => {
        scrubbing = false;
        elements.timelineTrack.releasePointerCapture(event.pointerId);
      });
      elements.timelineTrack.addEventListener("pointercancel", () => { scrubbing = false; });
      document.addEventListener("keydown", event => {
        if (event.key === " ") { event.preventDefault(); play(); }
        else if (event.key === "ArrowLeft") selectScene(sceneIndex - 1);
        else if (event.key === "ArrowRight") selectScene(sceneIndex + 1);
        else if (event.key === "[") { pause(); seek(frameIndex - 1); }
        else if (event.key === "]") { pause(); seek(frameIndex + 1); }
        else if ((event.ctrlKey || event.metaKey) && event.key === "0") { event.preventDefault(); setZoom(1); }
        else if ((event.ctrlKey || event.metaKey) && (event.key === "+" || event.key === "=")) { event.preventDefault(); setZoom(zoom * 1.2); }
        else if ((event.ctrlKey || event.metaKey) && event.key === "-") { event.preventDefault(); setZoom(zoom / 1.2); }
        else if (event.key.toLowerCase() === "f") document.documentElement.requestFullscreen?.();
      });

      new ResizeObserver(updateZoom).observe(elements.stage);
      document.addEventListener("visibilitychange", () => {
        if (document.hidden && pauseWhenHidden && playing) pause();
      });
      window.addEventListener("blur", () => {
        if (pauseWhenBlurred && playing) pause();
      });

      if (liveReload) {
        const events = new EventSource("/events");
        events.addEventListener("reload", () => loadManifest(true));
        events.addEventListener("build-error", event => showError(event.data));
      }
      let savedPauseWhenHidden;
      let savedPauseWhenBlurred;
      try { savedPauseWhenHidden = localStorage.getItem("glissade-pause-when-hidden"); } catch {}
      try { savedPauseWhenBlurred = localStorage.getItem("glissade-pause-when-blurred"); } catch {}
      pauseWhenHidden = savedPauseWhenHidden === null || savedPauseWhenHidden === undefined
        ? true
        : savedPauseWhenHidden !== "false";
      pauseWhenBlurred = savedPauseWhenBlurred === "true";
      elements.pauseWhenHidden.checked = pauseWhenHidden;
      elements.pauseWhenBlurred.checked = pauseWhenBlurred;
      loadManifest();
    })();
  </script>
</body>
</html>
